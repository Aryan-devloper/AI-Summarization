{% extends 'base.html' %}{% block body %}<div class="min-h-screen flex items-center justify-center px-4 bg-slate-50"><div class="w-full max-w-md glass rounded-2xl p-8 gradient-border"><h1 class="font-display text-xl font-bold mb-4 text-slate-900">Reset Password</h1><form method="post" class="space-y-4">{% csrf_token %}<input type="email" name="email" placeholder="Email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 transition-all" /><button type="submit" class="w-full btn-primary py-3 rounded-xl text-sm font-semibold">Send Reset Link</button></form><a href="{% url 'login' %}" class="block text-center text-xs text-slate-500 mt-4">← Back to login</a></div></div>{% endblock %}
